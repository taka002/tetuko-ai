<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>関係修復AI 完全版</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#111;color:#fff;}
header{padding:10px;text-align:center;background:#222;}
.tabs{display:flex}
.tabs button{flex:1;padding:10px;background:#333;color:#fff;border:none}
.section{display:none;padding:10px}
.active{display:block}
textarea{width:100%;height:90px;border-radius:8px;border:none;padding:10px}
button{margin:5px;padding:10px;border:none;border-radius:8px;background:#ff9800;color:#fff}
.card{background:#222;padding:10px;border-radius:10px;margin:10px 0}
</style>
</head>

<body>

<header>
関係修復AI
<br>
<select id="person">
<option>父</option>
<option>母</option>
<option>配偶者</option>
</select>
</header>

<div class="tabs">
<button onclick="show('home')">ホーム</button>
<button onclick="show('analysis')">分析</button>
<button onclick="show('log')">記録</button>
</div>

<!-- ホーム -->
<div id="home" class="section active">

<div>
<button onclick="setMood(2)">🙂</button>
<button onclick="setMood(1)">😐</button>
<button onclick="setMood(0)">😢</button>
</div>

<input type="file" accept="image/*" onchange="loadImage(event)">

<textarea id="input" placeholder="出来事・LINE"></textarea>

<button onclick="analyze()">AI分析</button>
<button onclick="check()">送信前チェック</button>

<div id="result" class="card"></div>

</div>

<!-- 分析 -->
<div id="analysis" class="section">
<div id="detail" class="card"></div>
</div>

<!-- 記録 -->
<div id="log" class="section">
<canvas id="chart"></canvas>
<div id="history"></div>
</div>

<script>
const API_KEY = "YOUR_API_KEY";
let mood = 1;

function setMood(m){ mood = m; }

function show(id){
 document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

// OCR
function loadImage(e){
 const file = e.target.files[0];
 document.getElementById("result").textContent="読み取り中...";
 Tesseract.recognize(file,'jpn+eng')
 .then(({data:{text}})=>{
  document.getElementById("input").value=text;
  document.getElementById("result").textContent="読み取り完了";
 });
}

// AI
async function callAI(prompt){
 const res = await fetch("https://api.openai.com/v1/chat/completions",{
  method:"POST",
  headers:{
   "Content-Type":"application/json",
   "Authorization":"Bearer "+API_KEY
  },
  body:JSON.stringify({
   model:"gpt-5.3",
   messages:[
    {role:"system",content:"家族関係修復AIとして分析"},
    {role:"user",content:prompt}
   ]
  })
 });
 const data = await res.json();
 return data.choices[0].message.content;
}

// 記録
function saveLog(score,text){
 let logs=JSON.parse(localStorage.getItem("logs")||"[]");
 logs.push({date:new Date().toLocaleDateString(),score,text});
 localStorage.setItem("logs",JSON.stringify(logs));
}

// グラフ
function drawChart(){
 let logs=JSON.parse(localStorage.getItem("logs")||"[]");
 new Chart(document.getElementById("chart"),{
  type:'line',
  data:{
   labels:logs.map(l=>l.date),
   datasets:[{label:'関係',data:logs.map(l=>l.score)}]
  }
 });
}

// 履歴
function showHistory(){
 let logs=JSON.parse(localStorage.getItem("logs")||"[]");
 document.getElementById("history").innerHTML=
 logs.map(l=>`<div class="card">${l.date}<br>${l.text}</div>`).join("");
}

// 分析
async function analyze(){
 let text=document.getElementById("input").value;
 document.getElementById("result").textContent="分析中...";
 let res=await callAI(`状況:${text} 気分:${mood}`);
 document.getElementById("result").textContent=res;
 document.getElementById("detail").textContent=res;

 let score=50+(mood==2?2:-2);
 saveLog(score,text);

 drawChart();
 showHistory();
}

// チェック
async function check(){
 let text=document.getElementById("input").value;
 document.getElementById("result").textContent="チェック中...";
 let res=await callAI(`この文章送るべきか:${text}`);
 document.getElementById("result").textContent=res;
}

// 初期
drawChart();
showHistory();
</script>

</body>
</html>
