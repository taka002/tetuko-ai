<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>徹子の関係修復AI</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#111;color:#fff;}
header{padding:10px;text-align:center;background:#222;}
.tabs{display:flex}
.tabs button{flex:1;padding:10px;background:#333;color:#fff;border:none}
.section{display:none;padding:10px}
.active{display:block}
textarea{width:100%;height:90px;border-radius:8px;border:none;padding:10px}
button{margin:5px;padding:12px;border:none;border-radius:10px;background:#ff9800;color:#fff}
.card{background:#222;padding:15px;border-radius:12px;margin:10px 0}
select,input{padding:10px;border-radius:8px;width:100%}
.selected{background:#4caf50!important;}
</style>
</head>

<body>

<header>
徹子の関係修復AI<br>
<small>少しずつ整えていきましょう</small><br>

<select id="person">
<option>父</option><option>母</option><option>子供</option>
<option>祖父</option><option>祖母</option><option>兄弟</option>
<option>配偶者</option><option>義理父</option><option>義理母</option>
<option>義理祖父</option><option>義理祖母</option><option>義理兄弟</option>
</select>
</header>

<!-- API -->
<div class="card">
APIキー
<input id="apiKeyInput" type="password">
<button onclick="saveKey()">保存</button>
</div>

<div class="tabs">
<button onclick="show('home')">ホーム</button>
<button onclick="show('log')">記録</button>
</div>

<!-- 初期 -->
<div id="setup" class="section active">

<div class="card">
関係状態<br>
<button class="phaseBtn" onclick="setPhase('対立',this)">対立</button>
<button class="phaseBtn" onclick="setPhase('距離',this)">距離</button>
<button class="phaseBtn" onclick="setPhase('疎遠',this)">疎遠</button>
<button class="phaseBtn" onclick="setPhase('危険',this)">危険</button>
</div>

<div class="card">
期間<br>
<button class="periodBtn" onclick="setPeriod('短期',this)">短期</button>
<button class="periodBtn" onclick="setPeriod('中期',this)">中期</button>
<button class="periodBtn" onclick="setPeriod('長期',this)">長期</button>
</div>

<div class="card">
連絡状況<br>
<button class="contactBtn" onclick="setContact('普通',this)">普通</button>
<button class="contactBtn" onclick="setContact('少ない',this)">少ない</button>
<button class="contactBtn" onclick="setContact('無視',this)">無視</button>
</div>

<div class="card">
目的<br>
<button class="goalBtn" onclick="setGoal('修復',this)">修復</button>
<button class="goalBtn" onclick="setGoal('改善',this)">改善</button>
<button class="goalBtn" onclick="setGoal('距離',this)">距離</button>
</div>

<button onclick="startApp()">開始</button>
</div>

<!-- ホーム -->
<div id="home" class="section">

<button onclick="toggleDetail()">詳細入力ON/OFF</button>

<div id="detailArea" style="display:none">

<div class="card">
相手の反応<br>
<button onclick="setDetail('reaction','普通',this)">普通</button>
<button onclick="setDetail('reaction','冷たい',this)">冷たい</button>
<button onclick="setDetail('reaction','無視',this)">無視</button>
</div>

<div class="card">
相手タイプ<br>
<button onclick="setDetail('type','理性的',this)">理性的</button>
<button onclick="setDetail('type','感情的',this)">感情的</button>
<button onclick="setDetail('type','頑固',this)">頑固</button>
</div>

<div class="card">
自分の気持ち<br>
<button onclick="setDetail('emotion','冷静',this)">冷静</button>
<button onclick="setDetail('emotion','不安',this)">不安</button>
<button onclick="setDetail('emotion','怒り',this)">怒り</button>
</div>

<div class="card">
衝動<br>
<button onclick="setDetail('impulse','なし',this)">なし</button>
<button onclick="setDetail('impulse','少し',this)">少し</button>
<button onclick="setDetail('impulse','強い',this)">強い</button>
</div>

<div class="card">
自分性格<br>
<button onclick="setDetail('self','冷静',this)">冷静</button>
<button onclick="setDetail('self','感情的',this)">感情的</button>
<button onclick="setDetail('self','我慢',this)">我慢</button>
</div>

</div>

<input type="file" onchange="loadImage(event)">
<textarea id="input"></textarea>

<button onclick="analyze()">相談</button>
<button onclick="check()">送信チェック</button>

<div id="result" class="card"></div>

</div>

<!-- 記録 -->
<div id="log" class="section">
<canvas id="chart"></canvas>
<div id="history"></div>
</div>

<script>
let API_KEY="";
let chart;
let detailMode=false;

let state={
 phase:"",period:"",contact:"",goal:"",
 reaction:"",type:"",emotion:"",impulse:"",self:""
};

// API
function saveKey(){
 API_KEY=document.getElementById("apiKeyInput").value;
 localStorage.setItem("apiKey",API_KEY);
 alert("保存");
}

window.onload=function(){
 API_KEY=localStorage.getItem("apiKey")||"";
 document.getElementById("apiKeyInput").value=API_KEY;
 drawChart();showHistory();
};

// 選択
function select(cls,btn){
 document.querySelectorAll("."+cls).forEach(b=>b.classList.remove("selected"));
 btn.classList.add("selected");
}

function setPhase(v,b){state.phase=v;select("phaseBtn",b);}
function setPeriod(v,b){state.period=v;select("periodBtn",b);}
function setContact(v,b){state.contact=v;select("contactBtn",b);}
function setGoal(v,b){state.goal=v;select("goalBtn",b);}

function setDetail(k,v,b){
 state[k]=v;
 let p=b.parentElement;
 p.querySelectorAll("button").forEach(x=>x.classList.remove("selected"));
 b.classList.add("selected");
}

function toggleDetail(){
 detailMode=!detailMode;
 document.getElementById("detailArea").style.display = detailMode?"block":"none";
}

function startApp(){
 if(!state.phase||!state.period){alert("選択");return;}
 show("home");
}

function show(id){
 document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

// OCR
function loadImage(e){
 Tesseract.recognize(e.target.files[0],'jpn').then(r=>{
  document.getElementById("input").value=r.data.text;
 });
}

// AI
async function callAI(prompt){
 if(!API_KEY)return "APIキー未入力";
 try{
  const res=await fetch("https://api.openai.com/v1/chat/completions",{
   method:"POST",
   headers:{
    "Content-Type":"application/json",
    "Authorization":"Bearer "+API_KEY
   },
   body:JSON.stringify({
    model:"gpt-5.3",
    messages:[
     {role:"system",content:"家族関係修復AI"},
     {role:"user",content:prompt}
    ]
   })
  });
  let d=await res.json();
  return d.choices?.[0]?.message?.content||"エラー";
 }catch{return "通信エラー";}
}

// 分析
async function analyze(){
 let text=document.getElementById("input").value;
 let person=document.getElementById("person").value;

 document.getElementById("result").textContent="考え中…";

 let res=await callAI(`
人物:${person}
状態:${state.phase}
期間:${state.period}
連絡:${state.contact}
目的:${state.goal}
反応:${state.reaction}
性格:${state.type}
感情:${state.emotion}
衝動:${state.impulse}
自分:${state.self}
内容:${text}
`);

 document.getElementById("result").textContent=res;
 saveLog(text);
}

// チェック
async function check(){
 let text=document.getElementById("input").value;
 let res=await callAI("送信していい？:"+text);
 document.getElementById("result").textContent=res;
}

// 保存
function saveLog(text){
 let logs=JSON.parse(localStorage.getItem("logs")||"[]");
 logs.push({date:new Date().toLocaleDateString(),text});
 localStorage.setItem("logs",JSON.stringify(logs));
 drawChart();showHistory();
}

// グラフ
function drawChart(){
 let logs=JSON.parse(localStorage.getItem("logs")||"[]");
 if(chart) chart.destroy();
 chart=new Chart(document.getElementById("chart"),{
  type:"line",
  data:{
   labels:logs.map(l=>l.date),
   datasets:[{data:logs.map((_,i)=>i+1)}]
  }
 });
}

// 履歴
function showHistory(){
 let logs=JSON.parse(localStorage.getItem("logs")||"[]");
 document.getElementById("history").innerHTML=
 logs.map(l=>`<div class="card">${l.date}<br>${l.text}</div>`).join("");
}
</script>

</body>
</html>
