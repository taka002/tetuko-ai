<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>徹子AI 完全統合版</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{background:#111;color:#fff;font-family:sans-serif;margin:0;}
.card{background:#222;padding:15px;border-radius:12px;margin:10px}
button{padding:10px;margin:5px;border:none;border-radius:8px;background:#ff9800;color:#fff}
textarea{width:100%;height:90px;border-radius:8px}
.warn{background:#b71c1c;padding:10px;border-radius:10px}
</style>
</head>

<body>

<div class="card">
APIキー
<input id="key" type="password">
<button onclick="saveKey()">保存</button>
</div>

<div class="card">
<input type="file" onchange="loadImage(event)">
<textarea id="input" placeholder="出来事・LINE"></textarea>

<button onclick="analyze()">相談</button>
<button onclick="check()">送信チェック</button>
<button onclick="reply()">返信生成</button>
<button onclick="coach()">伴走AI</button>
</div>

<div id="result" class="card"></div>
<div id="questions" class="card"></div>
<div id="warn"></div>

<!-- 日記 -->
<div class="card">
日記（感情）
<select id="mood">
<option value="2">😊</option>
<option value="1">😐</option>
<option value="0">😢</option>
</select>
<textarea id="diary"></textarea>
<button onclick="saveDiary()">保存</button>
</div>

<!-- 日記履歴 -->
<div id="diaryHistory" class="card"></div>

<!-- 振り返り -->
<div class="card">
振り返り
<button onclick="review('week')">週</button>
<button onclick="review('month')">月</button>
<button onclick="review('year')">年</button>
<button onclick="analyzePersonality()">性格分析</button>
</div>

<canvas id="chart"></canvas>

<script>
let API_KEY="";
let chart;

// API
function saveKey(){
 API_KEY=document.getElementById("key").value;
 localStorage.setItem("apiKey",API_KEY);
}

// OCR
function loadImage(e){
 Tesseract.recognize(e.target.files[0],'jpn+eng',{tessedit_pageseg_mode:6})
 .then(r=>{
  document.getElementById("input").value=r.data.text;
 });
}

// logs
function getLogs(){
 return JSON.parse(localStorage.getItem("logs")||"[]");
}

function saveLog(text,mood=null){
 let logs=getLogs();

 logs.push({
  id:Date.now(),
  date:new Date().toLocaleString(),
  timestamp:Date.now(),
  text,
  mood
 });

 localStorage.setItem("logs",JSON.stringify(logs));
 drawChart();
 renderDiaryHistory();
}

// profile
function getProfile(){
 return JSON.parse(localStorage.getItem("profile")||"{}");
}
function updateProfile(data){
 let p=getProfile();
 Object.assign(p,data);
 localStorage.setItem("profile",JSON.stringify(p));
}

// AI
async function callAI(prompt){
 if(!API_KEY)return "APIキー未入力";

 let res=await fetch("https://api.openai.com/v1/chat/completions",{
  method:"POST",
  headers:{
   "Content-Type":"application/json",
   "Authorization":"Bearer "+API_KEY
  },
  body:JSON.stringify({
   model:"gpt-4o-mini",
   messages:[
    {role:"system",content:"関係修復と伴走の専門AI。優しく現実的"},
    {role:"user",content:prompt}
   ]
  })
 });

 let d=await res.json();
 return d.choices?.[0]?.message?.content || "エラー";
}

// 危険検知
function danger(text){
 return ["怖い","暴力","死","消えたい"].some(w=>text.includes(w));
}

// コンテキスト
function context(text){
 let logs=getLogs().slice(-5).map(l=>l.text).join("\n");
 let profile=getProfile();

 return `
過去:${logs}
性格:${JSON.stringify(profile)}
今回:${text}
`;
}

// 相談
async function analyze(){
 let text=document.getElementById("input").value;

 let res=await callAI(context(text));
 document.getElementById("result").textContent=res;

 await generateQuestions(text);

 saveLog("相談:"+text);

 if(danger(text)){
  document.getElementById("warn").innerHTML="<div class='warn'>⚠ 危険の可能性。距離優先</div>";
 }
}

// 深掘り質問
async function generateQuestions(text){
 let res=await callAI("深掘り質問を3つ:"+text);
 document.getElementById("questions").textContent=res;
}

// チェック
async function check(){
 let text=document.getElementById("input").value;
 let res=await callAI("送るべき？"+context(text));
 document.getElementById("result").textContent=res;
 saveLog("チェック:"+text);
}

// 返信
async function reply(){
 let text=document.getElementById("input").value;
 let res=await callAI("返信文:"+context(text));
 document.getElementById("result").textContent=res;
}

// 伴走
async function coach(){
 let res=await callAI("長期伴走アドバイス:"+context(""));
 document.getElementById("result").textContent=res;
}

// 日記
function saveDiary(){
 let text=document.getElementById("diary").value;
 let mood=parseInt(document.getElementById("mood").value);

 saveLog("日記:"+text,mood);
 updateProfile({lastMood:mood});

 document.getElementById("diary").value="";
}

// 日記履歴表示
function renderDiaryHistory(){
 let logs=getLogs().filter(l=>l.text.startsWith("日記:"));

 document.getElementById("diaryHistory").innerHTML =
 logs.map(l=>`
  <div class="card">
   ${l.date}<br>${l.text}
   <button onclick="reviewDiary(${l.id})">振り返り</button>
  </div>
 `).join("");
}

// 日記振り返り＋徹子コメント
async function reviewDiary(id){
 let logs=getLogs();
 let t=logs.find(l=>l.id===id);

 let res=await callAI(`
この日記を振り返り

${t.text}

・気持ち整理
・改善
・徹子の一言
`);

 document.getElementById("result").textContent=res;
}

// グラフ（色分け）
function drawChart(){
 let logs=getLogs().filter(l=>l.mood!==null);

 if(chart) chart.destroy();

 chart=new Chart(document.getElementById("chart"),{
  type:"line",
  data:{
   labels:logs.map(l=>l.date),
   datasets:[{
    data:logs.map(l=>l.mood),
    segment:{
     borderColor:ctx=>{
      let v=ctx.p1.parsed.y;
      if(v==2)return "lime";
      if(v==1)return "yellow";
      return "red";
     }
    }
   }]
  }
 });
}

// 振り返り
async function review(type){
 let now=Date.now();
 let range={
  week:86400000*7,
  month:86400000*30,
  year:86400000*365
 };

 let logs=getLogs().filter(l=>now-l.timestamp<range[type]);
 let text=logs.map(l=>l.text).join("\n");

 let res=await callAI(`
期間分析:
${text}

・傾向
・改善
・徹子コメント
`);

 document.getElementById("result").textContent=res;
}

// 性格分析
async function analyzePersonality(){
 let logs=getLogs().map(l=>l.text).join("\n");

 let res=await callAI(`
性格分析:

${logs}

・タイプ
・特徴
・注意
・改善
・徹子コメント
`);

 document.getElementById("result").textContent=res;
}

// 初期
window.onload=function(){
 API_KEY=localStorage.getItem("apiKey")||"";
 document.getElementById("key").value=API_KEY;
 drawChart();
 renderDiaryHistory();
}
</script>

</body>
</html>
