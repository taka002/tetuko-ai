<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>徹子の関係修復AI</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#111;color:#fff;}
header{padding:10px;text-align:center;background:#222;}
.tabs{display:flex}
.tabs button{flex:1;padding:10px;background:#333;color:#fff;border:none}
.section{display:none;padding:10px}
.active{display:block}
textarea{width:100%;height:90px;border-radius:8px;border:none;padding:10px}
button{margin:5px;padding:12px;border:none;border-radius:10px;background:#ff9800;color:#fff}
.card{background:#222;padding:15px;border-radius:12px;margin:10px 0}
select,input{padding:10px;border-radius:8px;width:100%}
.selected{background:#4caf50!important;}
.warn{background:#b71c1c;color:#fff;padding:10px;border-radius:10px;margin-top:10px}
</style>
</head>

<body>

<header>
徹子の関係修復AI<br>
<small>少しずつ整えていきましょう</small><br>

<select id="person">
<option>父</option><option>母</option><option>子供</option>
<option>祖父</option><option>祖母</option><option>兄弟</option>
<option>配偶者</option><option>義理父</option><option>義理母</option>
<option>義理祖父</option><option>義理祖母</option><option>義理兄弟</option>
</select>
</header>

<div class="card">
APIキー
<input id="apiKeyInput" type="password">
<button onclick="saveKey()">保存</button>
</div>

<div class="tabs">
<button onclick="show('home')">ホーム</button>
<button onclick="show('log')">記録</button>
</div>

<div id="home" class="section active">

<textarea id="input" placeholder="出来事・LINE"></textarea>

<button onclick="analyze()">相談</button>
<button onclick="check()">送信チェック</button>
<button onclick="generateReply()">返信を作る</button>

<div id="result" class="card"></div>
<div id="warning"></div>

<div class="card">
日記
<textarea id="diary"></textarea>
<button onclick="saveDiary()">保存</button>
</div>

</div>

<div id="log" class="section">
<canvas id="chart"></canvas>
<div id="history"></div>
</div>

<script>
let API_KEY="";
let chart;

// API
function saveKey(){
 API_KEY=document.getElementById("apiKeyInput").value;
 localStorage.setItem("apiKey",API_KEY);
 alert("保存");
}

window.onload=function(){
 API_KEY=localStorage.getItem("apiKey")||"";
 document.getElementById("apiKeyInput").value=API_KEY;
 drawChart();showHistory();
};

function show(id){
 document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

// 履歴取得
function getHistoryText(){
 let logs=JSON.parse(localStorage.getItem("logs")||"[]");
 return logs.slice(-5).map(l=>l.text).join("\n");
}

// AI
async function callAI(prompt){
 if(!API_KEY)return "APIキー未入力";

 try{
  const res=await fetch("https://api.openai.com/v1/chat/completions",{
   method:"POST",
   headers:{
    "Content-Type":"application/json",
    "Authorization":"Bearer "+API_KEY
   },
   body:JSON.stringify({
    model:"gpt-4o-mini",
    messages:[
     {role:"system",content:"家族関係修復AI"},
     {role:"user",content:prompt}
    ]
   })
  });

  let data=await res.json();

  if(!res.ok){
   return JSON.stringify(data,null,2);
  }

  return data.choices?.[0]?.message?.content;

 }catch(e){
  return "通信エラー";
 }
}

// 危険判定
function dangerCheck(text){
 const dangerWords=["怖い","暴力","殴","無視","死","消えたい"];
 return dangerWords.some(w=>text.includes(w));
}

// 相談
async function analyze(){
 let text=document.getElementById("input").value;
 let history=getHistoryText();

 document.getElementById("result").textContent="分析中…";

 let res=await callAI(`
過去:
${history}

今回:
${text}
`);

 document.getElementById("result").textContent=res;

 if(dangerCheck(text)){
  document.getElementById("warning").innerHTML="<div class='warn'>⚠ 危険な状態の可能性あり。無理に修復せず距離も検討してください</div>";
 }

 saveLog("相談:"+text,50);
}

// チェック
async function check(){
 let text=document.getElementById("input").value;
 let history=getHistoryText();

 let res=await callAI(`
過去:
${history}

この文章を送るべきか:
${text}
`);

 document.getElementById("result").textContent=res;

 saveLog("チェック:"+text,50);
}

// 返信生成
async function generateReply(){
 let text=document.getElementById("input").value;
 let history=getHistoryText();

 document.getElementById("result").textContent="作成中…";

 let res=await callAI(`
過去:
${history}

この状況で送る最適な返信文を作ってください:
${text}
`);

 document.getElementById("result").textContent=res;
}

// 日記
function saveDiary(){
 let text=document.getElementById("diary").value;
 if(!text)return;

 saveLog("日記:"+text,50);
 document.getElementById("diary").value="";
}

// 保存
function saveLog(text,score){
 let logs=JSON.parse(localStorage.getItem("logs")||"[]");

 logs.push({
  date:new Date().toLocaleString(),
  text,
  score
 });

 localStorage.setItem("logs",JSON.stringify(logs));

 drawChart();
 showHistory();
}

// グラフ
function drawChart(){
 let logs=JSON.parse(localStorage.getItem("logs")||"[]");

 if(chart) chart.destroy();

 chart=new Chart(document.getElementById("chart"),{
  type:"line",
  data:{
   labels:logs.map(l=>l.date),
   datasets:[{
    label:"状態",
    data:logs.map((_,i)=>i+1)
   }]
  }
 });
}

// 履歴
function showHistory(){
 let logs=JSON.parse(localStorage.getItem("logs")||"[]");

 document.getElementById("history").innerHTML=
 logs.map(l=>`
  <div class="card">
   ${l.date}<br>${l.text}
  </div>
 `).join("");
}
</script>

</body>
</html>
