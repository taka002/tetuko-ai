<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>徹子の関係修復AI</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#111;color:#fff;}
header{padding:10px;text-align:center;background:#222;}
.tabs{display:flex}
.tabs button{flex:1;padding:10px;background:#333;color:#fff;border:none}
.section{display:none;padding:10px}
.active{display:block}
textarea{width:100%;height:90px;border-radius:8px;border:none;padding:10px}
button{margin:5px;padding:10px;border:none;border-radius:8px;background:#ff9800;color:#fff}
.card{background:#222;padding:10px;border-radius:10px;margin:10px 0}
select{padding:8px;border-radius:8px}
</style>
</head>

<body>

<header>
徹子の関係修復AI<br>
<small>少しずつ整えていきましょう</small><br>

<select id="person">
<option>父</option>
<option>母</option>
<option>配偶者</option>
</select>
</header>

<div class="tabs">
<button onclick="show('home')">ホーム</button>
<button onclick="show('analysis')">分析</button>
<button onclick="show('log')">記録</button>
</div>

<!-- 初期質問 -->
<div id="setup" class="section active">
<div class="card">
今の関係はどれですか？<br><br>
<button onclick="setPhase('対立')">① 話せるが揉めている</button><br>
<button onclick="setPhase('距離')">② 距離がある</button><br>
<button onclick="setPhase('疎遠')">③ ほぼ連絡なし</button><br>
<button onclick="setPhase('危険')">④ 危険・怖い</button>
</div>

<div class="card">
どれくらい続いていますか？<br><br>
<button onclick="setPeriod('短期')">① 数日〜</button>
<button onclick="setPeriod('中期')">② 数週間</button>
<button onclick="setPeriod('長期')">③ 数ヶ月〜</button>
<button onclick="setPeriod('超長期')">④ 半年以上</button>
</div>

<button onclick="startApp()">はじめる</button>
</div>

<!-- ホーム -->
<div id="home" class="section">

<div>
<button onclick="setMood(2)">🙂</button>
<button onclick="setMood(1)">😐</button>
<button onclick="setMood(0)">😢</button>
</div>

<input type="file" accept="image/*" onchange="loadImage(event)">

<textarea id="input" placeholder="出来事・LINE"></textarea>

<button onclick="analyze()">徹子に相談する</button>
<button onclick="check()">送る前に徹子に確認</button>

<div id="result" class="card"></div>

</div>

<!-- 分析 -->
<div id="analysis" class="section">
<div id="detail" class="card"></div>
</div>

<!-- 記録 -->
<div id="log" class="section">
<canvas id="chart"></canvas>
<div id="history"></div>
</div>

<script>
let mood=1;
let phase="";
let period="";
let chart;

const API_KEY = prompt("APIキーを入力してください");

function setMood(m){mood=m;}
function setPhase(p){phase=p;}
function setPeriod(p){period=p;}

function startApp(){
 if(!phase||!period){alert("選択してください");return;}
 document.getElementById("setup").classList.remove("active");
 document.getElementById("home").classList.add("active");
}

function show(id){
 document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

// OCR
function loadImage(e){
 const file=e.target.files[0];
 document.getElementById("result").textContent="読み取り中...";
 Tesseract.recognize(file,'jpn+eng')
 .then(({data:{text}})=>{
  document.getElementById("input").value=text;
  document.getElementById("result").textContent="読み取り完了";
 });
}

// AI
async function callAI(prompt){
 try{
  const res=await fetch("https://api.openai.com/v1/chat/completions",{
   method:"POST",
   headers:{
    "Content-Type":"application/json",
    "Authorization":"Bearer "+API_KEY
   },
   body:JSON.stringify({
    model:"gpt-5.3",
    messages:[
     {role:"system",content:"あなたは徹子の関係修復AI。優しく現実的に助言してください"},
     {role:"user",content:prompt}
    ]
   })
  });
  const data=await res.json();
  return data.choices?.[0]?.message?.content||"エラー";
 }catch(e){
  return "通信エラー";
 }
}

// 記録
function saveLog(score,text){
 let logs=JSON.parse(localStorage.getItem("logs")||"[]");
 logs.push({date:new Date().toLocaleDateString(),score,text});
 localStorage.setItem("logs",JSON.stringify(logs));
}

// グラフ
function drawChart(){
 let logs=JSON.parse(localStorage.getItem("logs")||"[]");
 if(chart) chart.destroy();
 chart=new Chart(document.getElementById("chart"),{
  type:'line',
  data:{
   labels:logs.map(l=>l.date),
   datasets:[{label:'関係',data:logs.map(l=>l.score)}]
  }
 });
}

// 履歴
function showHistory(){
 let logs=JSON.parse(localStorage.getItem("logs")||"[]");
 document.getElementById("history").innerHTML=
 logs.map(l=>`<div class="card">${l.date}<br>${l.text}</div>`).join("");
}

// 分析
async function analyze(){
 let text=document.getElementById("input").value;

 document.getElementById("result").textContent="少し整理しています…";

 let res=await callAI(`
関係状態:${phase}
期間:${period}
気分:${mood}
内容:${text}
`);

 document.getElementById("result").textContent="大丈夫、少しずつ整えていきましょう\n\n"+res;
 document.getElementById("detail").textContent=res;

 let score=50+(mood==2?2:-2);
 saveLog(score,text);
 drawChart();
 showHistory();
}

// チェック
async function check(){
 let text=document.getElementById("input").value;

 document.getElementById("result").textContent="確認しています…";

 let res=await callAI(`この文章を送るべきか判断:${text}`);

 document.getElementById("result").textContent=res;
}

// 初期
drawChart();
showHistory();
</script>

</body>
</html>
